# Smart Parking — Mosquitto Production Configuration
#
# How to apply:
# 1. Copy this content to: C:\Program Files\mosquitto\mosquitto.conf
# 2. Run: net stop mosquitto
# 3. Run: net start mosquitto
# 4. Verify: mosquitto_sub -h localhost -t "#" -v

# ── Network ────────────────────────────────────────────
# Listen on all interfaces so ESP32s on the LAN can connect
listener 1883 0.0.0.0

# ── Authentication ──────────────────────────────────────
# Allow anonymous connections (suitable for closed LAN)
# For public/cloud deployment, set up password file instead:
#   allow_anonymous false
#   password_file C:\mosquitto\passwd
allow_anonymous true

# ── Persistence ────────────────────────────────────────
# Retain messages across broker restarts
persistence true
persistence_location C:\mosquitto\data\

# ── Logging ────────────────────────────────────────────
log_dest file C:\mosquitto\log\mosquitto.log
log_type all
log_timestamp true

# ── Limits ─────────────────────────────────────────────
max_connections 50
max_packet_size 65535

# ─────────────────────────────────────────────────────────────
# How to verify broker is reachable from ESP32 or other device:
#
#   From another device on the SAME network:
#   mosquitto_pub -h 192.168.1.100 -t test -m "hello"
#   mosquitto_sub -h 192.168.1.100 -t "#" -v
#
#   You should see: test hello
#
# How to find your server's LAN IP (for ESP32 config):
#   Run: ipconfig
#   Look for: IPv4 Address . . . 192.168.x.x
# ─────────────────────────────────────────────────────────────
